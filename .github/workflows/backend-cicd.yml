name: backend-cicd

on:
  push:
    branches:
      - main
    paths:
      - "backend/**"
      - ".github/workflows/backend-cicd.yml"
  workflow_dispatch:
    inputs:
      image_tag:
        description: "Existing image tag to deploy for rollback. Leave empty to build current commit."
        required: false
        type: string

permissions:
  contents: read
  id-token: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    environment: production
    env:
      ACR_NAME: ${{ vars.ACR_NAME }}
      ACR_LOGIN_SERVER: ${{ vars.ACR_LOGIN_SERVER }}
      ACR_REPOSITORY: ${{ vars.ACR_REPOSITORY }}
      RESOURCE_GROUP: ${{ vars.RESOURCE_GROUP }}
      CONTAINER_APP_NAME: ${{ vars.CONTAINER_APP_NAME }}
      HEALTHCHECK_URL: ${{ vars.HEALTHCHECK_URL }}
      IMAGE_TAG_INPUT: ${{ inputs.image_tag }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Build and test backend
        if: ${{ env.IMAGE_TAG_INPUT == '' }}
        working-directory: backend
        run: mvn -B verify

      - name: Azure login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Install Container Apps CLI extension
        run: |
          az extension add --name containerapp --upgrade

      - name: Log in to Azure Container Registry
        run: |
          az acr login --name "$ACR_NAME"

      - name: Build and push backend image
        if: ${{ env.IMAGE_TAG_INPUT == '' }}
        working-directory: backend
        run: |
          IMAGE_SHA="${GITHUB_SHA}"
          IMAGE_REF="${ACR_LOGIN_SERVER}/${ACR_REPOSITORY}"
          docker build -f Containerfile \
            -t "${IMAGE_REF}:${IMAGE_SHA}" \
            -t "${IMAGE_REF}:latest" \
            .
          docker push "${IMAGE_REF}:${IMAGE_SHA}"
          docker push "${IMAGE_REF}:latest"
          echo "DEPLOY_IMAGE=${IMAGE_REF}:${IMAGE_SHA}" >> "$GITHUB_ENV"

      - name: Select rollback image
        if: ${{ env.IMAGE_TAG_INPUT != '' }}
        run: |
          echo "DEPLOY_IMAGE=${ACR_LOGIN_SERVER}/${ACR_REPOSITORY}:${IMAGE_TAG_INPUT}" >> "$GITHUB_ENV"

      - name: Capture previous revision
        id: previous
        shell: bash
        run: |
          PREVIOUS_REVISION=$(az containerapp revision list \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by(@,&properties.createdTime)[-1].name" \
            -o tsv)
          echo "previous=${PREVIOUS_REVISION}" >> "$GITHUB_OUTPUT"

      - name: Deploy new revision
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          az containerapp update \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --image "$DEPLOY_IMAGE" \
            --revision-suffix "$SHORT_SHA" \
            --set-env-vars "APP_DEPLOYMENT_VERSION=${GITHUB_SHA}"

      - name: Shift traffic to newest revision
        shell: bash
        run: |
          LATEST_REVISION=$(az containerapp revision list \
            --name "$CONTAINER_APP_NAME" \
            --resource-group "$RESOURCE_GROUP" \
            --query "sort_by(@,&properties.createdTime)[-1].name" \
            -o tsv)
          if [[ -n "${{ steps.previous.outputs.previous }}" && "${{ steps.previous.outputs.previous }}" != "$LATEST_REVISION" ]]; then
            az containerapp ingress traffic set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --revision-weight "${LATEST_REVISION}=100" "${{ steps.previous.outputs.previous }}=0"
          else
            az containerapp ingress traffic set \
              --name "$CONTAINER_APP_NAME" \
              --resource-group "$RESOURCE_GROUP" \
              --revision-weight "${LATEST_REVISION}=100"
          fi

      - name: Readiness probe
        shell: bash
        run: |
          for attempt in $(seq 1 18); do
            STATUS=$(curl -ksS -o /dev/null -w "%{http_code}" "${HEALTHCHECK_URL}/actuator/health/readiness" || true)
            if [[ "$STATUS" == "200" ]]; then
              exit 0
            fi
            sleep 10
          done
          echo "Health check failed after deployment" >&2
          exit 1
