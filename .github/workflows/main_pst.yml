# Docs for the Azure Web Apps Deploy action: https://github.com/Azure/webapps-deploy
# More GitHub Actions for Azure: https://github.com/Azure/actions

name: Build and deploy JAR app to Azure Web App - pst

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read #This is required for actions/checkout

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java version
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'microsoft'

      - name: Build with Maven
        working-directory: backend
        run: mvn -B clean package

      - name: Upload artifact for deployment job
        uses: actions/upload-artifact@v4
        with:
          name: java-app
          path: |
            ${{ github.workspace }}/backend/target/*.jar
            !${{ github.workspace }}/backend/target/*.jar.original

  deploy:
    runs-on: ubuntu-latest
    needs: build
    env:
      APP_NAME: pst
      APP_URL: https://pst-dug9c6gfbvd4facx.centralindia-01.azurewebsites.net
      SPRING_PROFILES_ACTIVE: production
      SPRINGDOC_SWAGGER_UI_ENABLED: 'false'
      SPRINGDOC_API_DOCS_ENABLED: 'false'
      SPRING_DATASOURCE_URL: ${{ secrets.SPRING_DATASOURCE_URL }}
      SPRING_DATASOURCE_USERNAME: ${{ secrets.SPRING_DATASOURCE_USERNAME }}
      SPRING_DATASOURCE_PASSWORD: ${{ secrets.SPRING_DATASOURCE_PASSWORD }}
      JWT_SECRET: ${{ secrets.JWT_SECRET }}
      APP_FRONTEND_URL: ${{ vars.APP_FRONTEND_URL }}
    permissions:
      id-token: write #This is required for requesting the JWT
      contents: read #This is required for actions/checkout
  
    steps:
      - name: Download artifact from build job
        uses: actions/download-artifact@v4
        with:
          name: java-app
          path: java-app
      
      - name: Login to Azure
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZUREAPPSERVICE_CLIENTID_E4AEDE500F484F1899D3183B67031198 }}
          tenant-id: ${{ secrets.AZUREAPPSERVICE_TENANTID_A4E3E4FE06ED41419C9CE5FF19B24460 }}
          subscription-id: ${{ secrets.AZUREAPPSERVICE_SUBSCRIPTIONID_785FD1D9EF7F45838B17BC81E4B4C62A }}

      - name: Resolve web app resource group
        id: app-service
        shell: bash
        run: |
          RESOURCE_GROUP=$(az webapp list --query "[?name=='${APP_NAME}'].resourceGroup | [0]" -o tsv)
          if [[ -z "$RESOURCE_GROUP" ]]; then
            echo "Unable to find resource group for Azure Web App '${APP_NAME}'." >&2
            exit 1
          fi
          echo "resource_group=${RESOURCE_GROUP}" >> "$GITHUB_OUTPUT"

      - name: Show App Service status details
        shell: bash
        run: |
          app_json=$(az webapp show \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" \
            --query "{name:name,state:state,availabilityState:availabilityState,serverFarmId:serverFarmId,defaultHostName:defaultHostName}" \
            -o json)

          echo "App Service details:"
          echo "${app_json}"

          plan_id=$(az webapp show \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" \
            --query "serverFarmId" \
            -o tsv)

          if [[ -n "${plan_id}" ]]; then
            plan_name="${plan_id##*/}"
            echo "App Service plan details:"
            az appservice plan show \
              --name "${plan_name}" \
              --resource-group "${{ steps.app-service.outputs.resource_group }}" \
              --query "{name:name,status:status,sku:sku.name,tier:sku.tier,numberOfWorkers:numberOfWorkers}" \
              -o json
          fi

      - name: Ensure Azure Web App is running
        shell: bash
        run: |
          current_state=$(az webapp show \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" \
            --query "state" \
            -o tsv)

          echo "Current App Service state: ${current_state}"

          if [[ "${current_state}" != "Running" ]]; then
            echo "Attempting to start Azure Web App '${APP_NAME}'..."
            az webapp start \
              --name "${APP_NAME}" \
              --resource-group "${{ steps.app-service.outputs.resource_group }}"
            sleep 15
          fi

          final_state=$(az webapp show \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" \
            --query "state" \
            -o tsv)

          echo "App Service state before deployment: ${final_state}"

          if [[ "${final_state}" != "Running" ]]; then
            echo "Azure Web App '${APP_NAME}' is not in Running state, so OneDeploy will fail." >&2
            echo "If you are on a Free or Shared plan, check whether the app hit quota limits or was stopped/disabled in Azure." >&2
            exit 1
          fi

      - name: Validate effective production settings
        shell: bash
        run: |
          required_vars=(
            SPRING_DATASOURCE_URL
            SPRING_DATASOURCE_USERNAME
            SPRING_DATASOURCE_PASSWORD
            JWT_SECRET
          )

          existing_names=$(az webapp config appsettings list \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" \
            --query "[].name" \
            -o tsv)

          missing=()
          for var_name in "${required_vars[@]}"; do
            if [[ -z "${!var_name}" ]]; then
              if ! printf '%s\n' "${existing_names}" | grep -Fxq "${var_name}"; then
                missing+=("$var_name")
              fi
            fi
          done

          if (( ${#missing[@]} > 0 )); then
            printf 'Missing required runtime settings. Add them either as GitHub Actions secrets or as Azure Web App app settings:\n' >&2
            printf '  - %s\n' "${missing[@]}" >&2
            exit 1
          fi

          if [[ -z "${SPRING_DATASOURCE_URL}" ]]; then
            echo "Using Azure Web App app settings for datasource secrets; skipping JDBC URL value validation because Azure CLI redacts app setting values." >&2
            exit 0
          fi

          if [[ "${SPRING_DATASOURCE_URL}" != jdbc:postgresql://* ]]; then
            echo "SPRING_DATASOURCE_URL must be a full PostgreSQL JDBC URL starting with 'jdbc:postgresql://'." >&2
            exit 1
          fi

          if [[ "${SPRING_DATASOURCE_URL}" == *".postgres.database.azure.com.postgres.database.azure.com"* ]]; then
            echo "SPRING_DATASOURCE_URL contains a duplicated Azure Database for PostgreSQL host suffix." >&2
            echo "Use the server host only once, for example: jdbc:postgresql://<server>.postgres.database.azure.com:5432/<database>?sslmode=require" >&2
            exit 1
          fi

      - name: Configure Azure Web App app settings
        shell: bash
        run: |
          settings=(
            "SPRING_PROFILES_ACTIVE=${SPRING_PROFILES_ACTIVE}"
            "SPRINGDOC_SWAGGER_UI_ENABLED=${SPRINGDOC_SWAGGER_UI_ENABLED}"
            "SPRINGDOC_API_DOCS_ENABLED=${SPRINGDOC_API_DOCS_ENABLED}"
          )

          if [[ -n "${APP_FRONTEND_URL}" ]]; then
            settings+=("APP_FRONTEND_URL=${APP_FRONTEND_URL}")
          fi

          if [[ -n "${SPRING_DATASOURCE_URL}" ]]; then
            settings+=("SPRING_DATASOURCE_URL=${SPRING_DATASOURCE_URL}")
          fi

          if [[ -n "${SPRING_DATASOURCE_USERNAME}" ]]; then
            settings+=("SPRING_DATASOURCE_USERNAME=${SPRING_DATASOURCE_USERNAME}")
          fi

          if [[ -n "${SPRING_DATASOURCE_PASSWORD}" ]]; then
            settings+=("SPRING_DATASOURCE_PASSWORD=${SPRING_DATASOURCE_PASSWORD}")
          fi

          if [[ -n "${JWT_SECRET}" ]]; then
            settings+=("JWT_SECRET=${JWT_SECRET}")
          fi

          az webapp config appsettings set \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" \
            --settings "${settings[@]}"

      - name: Enable App Service log streaming
        shell: bash
        run: |
          az webapp log config \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" \
            --application-logging filesystem \
            --docker-container-logging filesystem \
            --level information

      - name: Deploy to Azure Web App
        id: deploy-to-webapp
        uses: azure/webapps-deploy@v3
        with:
          app-name: 'pst'
          slot-name: 'Production'
          package: 'java-app/*.jar'

      - name: Verify application health
        shell: bash
        run: |
          for attempt in $(seq 1 18); do
            status=$(curl -ksS -o /dev/null -w "%{http_code}" "${APP_URL}/actuator/health/readiness" || true)
            echo "Health check attempt ${attempt}: HTTP ${status:-000}"
            if [[ "$status" == "200" ]]; then
              exit 0
            fi
            sleep 10
          done

          echo "Azure Web App did not become ready at ${APP_URL}/actuator/health/readiness" >&2
          exit 1

      - name: Dump App Service logs on failure
        if: ${{ failure() }}
        shell: bash
        run: |
          echo "Recent response from readiness endpoint:"
          curl -ksS -i "${APP_URL}/actuator/health/readiness" || true
          echo
          echo "Recent response from liveness endpoint:"
          curl -ksS -i "${APP_URL}/actuator/health/liveness" || true
          echo
          echo "Recent response from aggregate health endpoint:"
          curl -ksS -i "${APP_URL}/actuator/health" || true
          echo
          echo "Tailing Azure Web App logs for diagnostics:"
          timeout 45s az webapp log tail \
            --name "${APP_NAME}" \
            --resource-group "${{ steps.app-service.outputs.resource_group }}" || true
          
